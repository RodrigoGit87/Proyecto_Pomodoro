<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro</title>
    <link rel="stylesheet" href="styles/pomodoro.css">
    <script src="scripts/pomodoro.js" defer></script>
</head>

<body>
    <h1 id="titulo"><em>Pomodoro Timer</em></h1>
    <div id="divPadre">
        
        <div id="caja">
            <div id="reloj">
                <h2 id="minutos">25</h2>
                <h2 id="separador">:</h2>
                <h2 id="segundos">00</h2>
            </div>
            <div id="btn_start_stop">
                <h2 id="start">start</h2>
                <h2 id="stop">stop</h2>
            </div>
            <div id="counter">0</div>
        </div>
        <div id="notificacion" class="oculto">
            <p id="mensaje-notificacion"></p>
        </div>
    </div>
</body>

</html>
